<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo mailto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }

        a.button {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
        }

        a.button:hover {
            background: #0056b3;
        }

        code {
            display: block;
            margin-top: 1rem;
            font-size: 0.85rem;
            background: #eee;
            padding: 0.5rem;
            border-radius: 6px;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Demo mailto</h1>
    <p>Haz clic en el botón para abrir tu cliente de correo con asunto y cuerpo predefinidos.</p>

    <a
            class="button"
            href="mailto:destino@ejemplo.com?subject=Consulta%20sobre%20el%20servicio&body=Hola,%0A%0ANecesito%20informaci%C3%B3n%20sobre%20sus%20servicios.%0A%0AGracias."
    >
        Enviar correo
    </a>

    <code>
        mailto:destino@ejemplo.com?subject=Consulta%20sobre%20el%20servicio&body=Hola,%0A%0ANecesito%20informaci%C3%B3n%20sobre%20sus%20servicios.%0A%0AGracias.
    </code>
</div>
</body>
</html>
